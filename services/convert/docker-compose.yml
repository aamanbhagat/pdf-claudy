services:
  convert:
    build: .
    image: patra-convert
    container_name: patra-convert
    restart: unless-stopped
    init: true
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - CONVERT_TOKEN=${CONVERT_TOKEN}
      - MAX_BYTES=62914560 # 60 MB
      - MAX_CONCURRENCY=2
    mem_limit: 4g
